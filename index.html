<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>耗材价格计算器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(to bottom, #fff1f2, #fdf2f8, #f0f9ff);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .phone-card {
      width: 100%;
      max-width: 390px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
    }

    .header {
      background: linear-gradient(to right, #fbcfe8, #fef3c7, #bae6fd);
      padding: 22px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      color: #334155;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #475569;
    }

    .content {
      padding: 20px;
    }

    .input-card {
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
    }

    .pink-card {
      background: #fdf2f8;
      border: 1px solid #fbcfe8;
    }

    .blue-card {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
    }

    label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      background: white;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #f9a8d4;
      box-shadow: 0 0 0 3px rgba(249, 168, 212, 0.2);
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-reset {
      background: #fef3c7;
      color: #334155;
    }

    .btn-calc {
      background: linear-gradient(to right, #f9a8d4, #93c5fd);
      color: #1e293b;
      box-shadow: 0 8px 20px rgba(249, 168, 212, 0.25);
    }

    .result-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(to bottom right, #ffffff, #fff1f2);
      border: 1px solid #ffe4e6;
      box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.8);
      display: none;
    }

    .result-box h2 {
      font-size: 20px;
      color: #334155;
      margin-bottom: 14px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      font-size: 14px;
      color: #475569;
    }

    .result-row span:last-child {
      font-weight: 700;
      color: #1e293b;
    }

    .row-pink {
      background: #fdf2f8;
    }

    .row-blue {
      background: #f0f9ff;
    }

    .row-total {
      background: linear-gradient(to right, #fce7f3, #fef3c7);
      padding: 16px;
      margin-top: 6px;
    }

    .row-total .label {
      font-size: 17px;
      font-weight: 700;
      color: #334155;
    }

    .row-total .value {
      font-size: 30px;
      font-weight: 800;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="phone-card">
    <div class="header">
      <h1>耗材价格计算器</h1>
      <p>普通耗材 ¥0.2/g ｜ 丝绸/渐变 ¥0.3/g</p>
    </div>

    <div class="content">
      <div class="input-card pink-card">
        <label for="normalWeight">普通耗材（g）</label>
        <input type="number" id="normalWeight" min="0" step="0.1" placeholder="请输入普通耗材克数" />
      </div>

      <div class="input-card blue-card">
        <label for="specialWeight">丝绸/渐变（g）</label>
        <input type="number" id="specialWeight" min="0" step="0.1" placeholder="请输入丝绸/渐变克数" />
      </div>

      <div class="btn-group">
        <button class="btn-reset" onclick="resetForm()">清空</button>
        <button class="btn-calc" onclick="calculatePrice()">计算价格</button>
      </div>

      <div class="result-box" id="resultBox">
        <h2>计算结果</h2>

        <div class="result-row row-pink">
          <span>普通耗材费用</span>
          <span id="normalCost">¥0.00</span>
        </div>

        <div class="result-row row-blue">
          <span>丝绸/渐变费用</span>
          <span id="specialCost">¥0.00</span>
        </div>

        <div class="result-row row-total">
          <span class="label">总价</span>
          <span class="value" id="totalCost">¥0.00</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function calculatePrice() {
      const normalWeight = parseFloat(document.getElementById("normalWeight").value) || 0;
      const specialWeight = parseFloat(document.getElementById("specialWeight").value) || 0;
    if (normalWeight < 0 || specialWeight < 0) {
      alert("你负尼玛呢");
      return;
    }
      const normalCost = normalWeight * 0.2;
      const specialCost = specialWeight * 0.3;
      const totalCost = normalCost + specialCost;

      document.getElementById("normalCost").textContent = "¥" + normalCost.toFixed(2);
      document.getElementById("specialCost").textContent = "¥" + specialCost.toFixed(2);
      document.getElementById("totalCost").textContent = "¥" + totalCost.toFixed(2);

      document.getElementById("resultBox").style.display = "block";
    }

    function resetForm() {
      document.getElementById("normalWeight").value = "";
      document.getElementById("specialWeight").value = "";
      document.getElementById("resultBox").style.display = "none";
    }
  </script>

</body>
</html>
