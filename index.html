from pathlib import Path

html = """<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>耗材价格计算器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #ffe4ec 0%, #fff1cc 45%, #dff3ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      color: #5b6075;
    }

    .phone {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 30px;
      box-shadow: 0 18px 40px rgba(130, 110, 160, 0.16);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .top {
      padding: 24px 22px 18px;
      background: linear-gradient(90deg, #ffc9de 0%, #ffe7b3 48%, #ccecff 100%);
      text-align: center;
    }

    .top h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.2;
      color: #5f6177;
    }

    .sub {
      margin-top: 10px;
      font-size: 14px;
      color: #6b7280;
    }

    .content {
      padding: 18px;
    }

    .card {
      border-radius: 22px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 20px rgba(190, 190, 220, 0.12);
    }

    .card.normal {
      background: #fff0f6;
      border: 1px solid #ffd9e9;
    }

    .card.special {
      background: #eef8ff;
      border: 1px solid #d4ecff;
    }

    .label {
      display: block;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #5f6177;
    }

    .hint {
      font-size: 12px;
      color: #8b90a7;
      margin-top: -4px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      border: 1.5px solid #e8e8f0;
      border-radius: 16px;
      padding: 14px 15px;
      font-size: 16px;
      outline: none;
      background: #fff;
      color: #4b5563;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #f6a8c8;
      box-shadow: 0 0 0 4px rgba(246, 168, 200, 0.18);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.2s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-reset {
      background: #ffe9a9;
      color: #6b5d39;
      box-shadow: 0 8px 18px rgba(255, 211, 94, 0.2);
    }

    .btn-calc {
      background: linear-gradient(90deg, #ffb8d6 0%, #b8e3ff 100%);
      color: #5a6070;
      box-shadow: 0 8px 18px rgba(172, 208, 255, 0.22);
    }

    .result {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, #ffffff 0%, #fff7fb 100%);
      border: 1px solid #ffe2ef;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .result-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #5f6177;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      font-size: 14px;
      background: #fff;
    }

    .row.normal-row { background: #fff2f7; }
    .row.special-row { background: #eef8ff; }
    .row.total-row {
      background: linear-gradient(90deg, #ffe3ef 0%, #fff0c7 100%);
      margin-bottom: 0;
      padding: 14px 16px;
    }

    .money {
      font-weight: 700;
      color: #4b5563;
    }

    .total-row .money {
      font-size: 28px;
      font-weight: 800;
      color: #3f4659;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #9aa1b5;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="top">
      <h1>耗材价格计算器</h1>
      <div class="sub">普通耗材 ¥0.2/g ｜ 丝绸/渐变 ¥0.3/g</div>
    </div>

    <div class="content">
      <div class="card normal">
        <label class="label" for="normal">普通耗材（g）</label>
        <div class="hint">按普通耗材克数输入</div>
        <input id="normal" type="number" min="0" step="0.1" placeholder="请输入普通耗材克数" />
      </div>

      <div class="card special">
        <label class="label" for="special">丝绸 / 渐变（g）</label>
        <div class="hint">按丝绸或渐变耗材克数输入</div>
        <input id="special" type="number" min="0" step="0.1" placeholder="请输入丝绸/渐变克数" />
      </div>

      <div class="buttons">
        <button class="btn-reset" onclick="resetData()">清空</button>
        <button class="btn-calc" onclick="calculatePrice()">生成结果</button>
      </div>

      <div class="result" id="resultBox">
        <div class="result-title">计算结果</div>
        <div class="row normal-row">
          <span>普通耗材费用</span>
          <span class="money" id="normalCost">¥0.00</span>
        </div>
        <div class="row special-row">
          <span>丝绸/渐变费用</span>
          <span class="money" id="specialCost">¥0.00</span>
        </div>
        <div class="row total-row">
          <span style="font-size:16px;font-weight:700;">总价</span>
          <span class="money" id="totalCost">¥0.00</span>
        </div>
      </div>

      <div class="footer-note">适合手机端打开和直接使用</div>
    </div>
  </div>

  <script>
    function calculatePrice() {
      const normal = parseFloat(document.getElementById('normal').value) || 0;
      const special = parseFloat(document.getElementById('special').value) || 0;

      const normalCost = normal * 0.2;
      const specialCost = special * 0.3;
      const totalCost = normalCost + specialCost;

      document.getElementById('normalCost').textContent = '¥' + normalCost.toFixed(2);
      document.getElementById('specialCost').textContent = '¥' + specialCost.toFixed(2);
      document.getElementById('totalCost').textContent = '¥' + totalCost.toFixed(2);
      document.getElementById('resultBox').style.display = 'block';
    }

    function resetData() {
      document.getElementById('normal').value = '';
      document.getElementById('special').value = '';
      document.getElementById('normalCost').textContent = '¥0.00';
      document.getElementById('specialCost').textContent = '¥0.00';
      document.getElementById('totalCost').textContent = '¥0.00';
      document.getElementById('resultBox').style.display = 'none';
    }
  </script>
</body>
</html>
"""

path = Path("/mnt/data/index.html")
path.write_text(html, encoding="utf-8")
print(f"Saved to {path}")
